<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrretStudio — Creative Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-panel: #12121a;
            --bg-surface: #1a1a24;
            --bg-elevated: #22222e;
            --border: #2a2a3a;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.3);
            --accent-cyan: #00d4ff;
            --accent-magenta: #ff00aa;
            --accent-lime: #b4ff00;
            --text: #e8e8ec;
            --text-dim: #8888a0;
            --text-muted: #555566;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4466;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* Layout */
        .app-container {
            display: grid;
            grid-template-columns: 64px 280px 1fr;
            grid-template-rows: 48px 1fr 200px;
            height: 100vh;
        }

        /* Top Bar */
        .topbar {
            grid-column: 1 / -1;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 15px;
            color: var(--accent);
        }

        .logo svg {
            width: 28px;
            height: 28px;
        }

        .tool-tabs {
            display: flex;
            gap: 4px;
            flex: 1;
        }

        .tool-tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-tab:hover {
            background: var(--bg-surface);
            color: var(--text);
        }

        .tool-tab.active {
            background: var(--bg-elevated);
            color: var(--text);
        }

        .tool-tab.active::before {
            content: '';
            width: 3px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
            margin-right: 4px;
        }

        /* Toolbar */
        .toolbar {
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toolbar-section {
            margin-bottom: 16px;
        }

        .toolbar-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding: 0 8px;
        }

        .tool-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            transition: all 0.15s;
            text-align: left;
        }

        .tool-btn:hover {
            background: var(--bg-surface);
            color: var(--text);
            border-color: var(--border);
        }

        .tool-btn.active {
            background: var(--accent-glow);
            color: var(--accent);
            border-color: var(--accent);
        }

        .tool-btn svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Canvas Area */
        .canvas-area {
            background: var(--bg-dark);
            position: relative;
            overflow: hidden;
        }

        .canvas-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
        }

        #main-canvas {
            width: 100%;
            height: 100%;
        }

        /* Timeline */
        .timeline {
            grid-column: 2 / -1;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .timeline-header {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .timeline-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .timeline-btn {
            width: 32px;
            height: 32px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .timeline-btn:hover {
            background: var(--bg-elevated);
            color: var(--text);
        }

        .timeline-btn.play {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .timeline-scrubber {
            flex: 1;
            height: 4px;
            background: var(--bg-surface);
            border-radius: 2px;
            margin: 0 16px;
            position: relative;
        }

        .timeline-scrubber-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-cyan));
            border-radius: 2px;
            width: 30%;
        }

        .timeline-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-dim);
            min-width: 80px;
            text-align: right;
        }

        .timeline-tracks {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .track {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            margin-bottom: 4px;
            border-radius: 4px;
        }

        .track:hover {
            background: var(--bg-surface);
        }

        .track-label {
            width: 80px;
            font-size: 11px;
            color: var(--text-dim);
        }

        .track-content {
            flex: 1;
            height: 24px;
            background: var(--bg-surface);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .track-clip {
            position: absolute;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-magenta), var(--accent-cyan));
            border-radius: 4px;
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-size: 10px;
            color: white;
            cursor: pointer;
        }

        /* Properties Panel */
        .properties-panel {
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            width: 280px;
            padding: 16px;
            overflow-y: auto;
        }

        .prop-section {
            margin-bottom: 20px;
        }

        .prop-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .prop-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .prop-label {
            width: 60px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .prop-input {
            flex: 1;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
            color: var(--text);
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
        }

        .prop-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .color-picker {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 2px solid var(--border);
            cursor: pointer;
            background: var(--accent);
        }

        /* Layers Panel */
        .layers-panel {
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            width: 200px;
            padding: 12px;
        }

        .layer-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .layer {
            padding: 8px;
            background: var(--bg-surface);
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .layer:hover {
            border-color: var(--border);
        }

        .layer.selected {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .layer-visibility {
            width: 16px;
            height: 16px;
            color: var(--text-dim);
            cursor: pointer;
        }

        .layer-visibility:hover {
            color: var(--text);
        }

        .layer-thumb {
            width: 32px;
            height: 32px;
            background: var(--bg-elevated);
            border-radius: 4px;
        }

        .layer-name {
            flex: 1;
            font-size: 12px;
        }

        /* Tool-specific panels */
        .tool-view {
            display: none;
            height: 100%;
        }

        .tool-view.active {
            display: grid;
            grid-template-columns: 200px 1fr 280px;
        }

        /* Browser View */
        .browser-toolbar {
            height: 40px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
        }

        .browser-url {
            flex: 1;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 16px;
            color: var(--text);
            font-size: 13px;
        }

        .browser-url:focus {
            outline: none;
            border-color: var(--accent);
        }

        .browser-frame {
            flex: 1;
            background: white;
            border-radius: 8px;
            margin: 8px;
            overflow: hidden;
        }

        .browser-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Image Editor Tools */
        .brush-preview {
            position: fixed;
            pointer-events: none;
            border: 1px solid var(--accent);
            border-radius: 50%;
            opacity: 0.5;
            display: none;
        }

        /* Animation */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .recording {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Top Bar -->
        <div class="topbar">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
                    <line x1="12" y1="22" x2="12" y2="15.5"/>
                    <polyline points="22 8.5 12 15.5 2 8.5"/>
                </svg>
                OrretStudio
            </div>
            
            <div class="tool-tabs">
                <button class="tool-tab active" data-tool="canvas">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    Canvas
                </button>
                <button class="tool-tab" data-tool="animate">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    Animate
                </button>
                <button class="tool-tab" data-tool="design">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="9" y1="21" x2="9" y2="9"/>
                    </svg>
                    Design
                </button>
                <button class="tool-tab" data-tool="paint">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 19l7-7 3 3-7 7-3-3z"/>
                        <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                        <path d="M2 2l7.586 7.586"/>
                    </svg>
                    Paint
                </button>
                <button class="tool-tab" data-tool="browser">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    Browser
                </button>
            </div>

            <div style="display: flex; gap: 8px; margin-left: auto;">
                <button class="timeline-btn" title="Export">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </button>
                <button class="timeline-btn" title="Settings">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Canvas View -->
        <div class="tool-view active" id="canvas-view">
            <div class="toolbar">
                <div class="toolbar-section">
                    <div class="toolbar-label">Outils</div>
                    <button class="tool-btn active" data-tool="select">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                        </svg>
                        Sélection
                    </button>
                    <button class="tool-btn" data-tool="rect">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                        </svg>
                        Rectangle
                    </button>
                    <button class="tool-btn" data-tool="ellipse">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                        </svg>
                        Ellipse
                    </button>
                    <button class="tool-btn" data-tool="line">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="19" x2="19" y2="5"/>
                        </svg>
                        Ligne
                    </button>
                    <button class="tool-btn" data-tool="text">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="4 7 4 4 20 4 20 7"/>
                            <line x1="9" y1="20" x2="15" y2="20"/>
                            <line x1="12" y1="4" x2="12" y2="20"/>
                        </svg>
                        Texte
                    </button>
                    <button class="tool-btn" data-tool="pen">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 19l7-7 3 3-7 7-3-3z"/>
                            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                        </svg>
                        Plume
                    </button>
                </div>

                <div class="toolbar-section">
                    <div class="toolbar-label">Formes</div>
                    <button class="tool-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2"/>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                        </svg>
                        iPhone
                    </button>
                    <button class="tool-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2"/>
                            <line x1="8" y1="21" x2="16" y2="21"/>
                            <line x1="12" y1="17" x2="12" y2="21"/>
                        </svg>
                        Browser
                    </button>
                    <button class="tool-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <line x1="3" y1="9" x2="21" y2="9"/>
                            <line x1="9" y1="21" x2="9" y2="9"/>
                        </svg>
                        Grille
                    </button>
                </div>
            </div>

            <div class="canvas-area">
                <div class="canvas-grid"></div>
                <canvas id="main-canvas"></canvas>
            </div>

            <div class="properties-panel">
                <div class="prop-section">
                    <div class="prop-title">Position</div>
                    <div class="prop-row">
                        <span class="prop-label">X</span>
                        <input type="number" class="prop-input" value="100">
                    </div>
                    <div class="prop-row">
                        <span class="prop-label">Y</span>
                        <input type="number" class="prop-input" value="100">
                    </div>
                </div>
                <div class="prop-section">
                    <div class="prop-title">Taille</div>
                    <div class="prop-row">
                        <span class="prop-label">W</span>
                        <input type="number" class="prop-input" value="200">
                    </div>
                    <div class="prop-row">
                        <span class="prop-label">H</span>
                        <input type="number" class="prop-input" value="150">
                    </div>
                </div>
                <div class="prop-section">
                    <div class="prop-title">Remplissage</div>
                    <div class="prop-row">
                        <input type="color" class="color-picker" value="#ff6b35">
                        <input type="text" class="prop-input" value="#ff6b35" style="margin-left: 8px;">
                    </div>
                </div>
                <div class="prop-section">
                    <div class="prop-title">Contour</div>
                    <div class="prop-row">
                        <span class="prop-label">Couleur</span>
                        <input type="color" class="color-picker" value="#ffffff">
                    </div>
                    <div class="prop-row">
                        <span class="prop-label">Épaisseur</span>
                        <input type="number" class="prop-input" value="2">
                    </div>
                </div>
                <div class="prop-section">
                    <div class="prop-title">Effets</div>
                    <div class="prop-row">
                        <span class="prop-label">Opacité</span>
                        <input type="range" class="prop-input" min="0" max="100" value="100" style="padding: 0;">
                    </div>
                    <div class="prop-row">
                        <span class="prop-label">Flou</span>
                        <input type="number" class="prop-input" value="0">
                    </div>
                    <div class="prop-row">
                        <span class="prop-label">Ombre</span>
                        <input type="checkbox">
                    </div>
                </div>
            </div>
        </div>

        <!-- Timeline (visible in Animate mode) -->
        <div class="timeline">
            <div class="timeline-header">
                <div class="timeline-controls">
                    <button class="timeline-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="19 20 9 12 19 4 19 20"/>
                            <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                    <button class="timeline-btn play">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                    </button>
                    <button class="timeline-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 4 15 12 5 20 5 4"/>
                            <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                    <div class="recording"></div>
                </div>
                <div class="timeline-scrubber">
                    <div class="timeline-scrubber-fill"></div>
                </div>
                <div class="timeline-time">00:00:12 / 00:01:00</div>
            </div>
            <div class="timeline-tracks">
                <div class="track">
                    <span class="track-label">Vidéo 1</span>
                    <div class="track-content">
                        <div class="track-clip" style="left: 0; width: 60%;">Intro Sequence</div>
                    </div>
                </div>
                <div class="track">
                    <span class="track-label">Audio 1</span>
                    <div class="track-content">
                        <div class="track-clip" style="left: 10%; width: 50%; background: linear-gradient(90deg, #b4ff00, #00ff88);">Music Track</div>
                    </div>
                </div>
                <div class="track">
                    <span class="track-label">Vidéo 2</span>
                    <div class="track-content">
                        <div class="track-clip" style="left: 30%; width: 40%;">Transition</div>
                    </div>
                </div>
                <div class="track">
                    <span class="track-label">Texte 1</span>
                    <div class="track-content">
                        <div class="track-clip" style="left: 50%; width: 30%; background: linear-gradient(90deg, #00d4ff, #ff00aa);">Title</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="brush-preview" id="brush-preview"></div>

    <script>
        // OrretStudio Canvas Engine
        class OrretCanvas {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.objects = [];
                this.selectedTool = 'select';
                this.selectedObject = null;
                this.isDragging = false;
                this.startPoint = { x: 0, y: 0 };
                
                this.resize();
                this.setupEvents();
                this.addDefaultObjects();
                this.render();
            }

            resize() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
            }

            setupEvents() {
                window.addEventListener('resize', () => this.resize());
                
                this.canvas.addEventListener('mousedown', (e) => this.onMouseDown(e));
                this.canvas.addEventListener('mousemove', (e) => this.onMouseMove(e));
                this.canvas.addEventListener('mouseup', (e) => this.onMouseUp(e));

                // Tool buttons
                document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.selectedTool = btn.dataset.tool;
                    });
                });
            }

            addDefaultObjects() {
                // Add some default objects for demo
                this.objects.push({
                    type: 'rect',
                    x: 100,
                    y: 100,
                    width: 200,
                    height: 150,
                    fill: '#ff6b35',
                    stroke: '#ffffff',
                    strokeWidth: 2,
                    opacity: 1,
                    rotation: 0
                });

                this.objects.push({
                    type: 'ellipse',
                    x: 400,
                    y: 200,
                    width: 120,
                    height: 120,
                    fill: '#00d4ff',
                    stroke: '#ffffff',
                    strokeWidth: 2,
                    opacity: 0.8,
                    rotation: 0
                });

                this.objects.push({
                    type: 'text',
                    x: 150,
                    y: 300,
                    text: 'OrretStudio',
                    font: 'bold 32px Inter',
                    fill: '#ffffff',
                    stroke: 'transparent',
                    strokeWidth: 0,
                    opacity: 1,
                    rotation: 0
                });
            }

            render() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw objects
                this.objects.forEach(obj => {
                    this.ctx.save();
                    this.ctx.globalAlpha = obj.opacity;
                    
                    if (obj.rotation) {
                        const cx = obj.x + obj.width / 2;
                        const cy = obj.y + obj.height / 2;
                        this.ctx.translate(cx, cy);
                        this.ctx.rotate(obj.rotation * Math.PI / 180);
                        this.ctx.translate(-cx, -cy);
                    }

                    if (obj.type === 'rect') {
                        this.ctx.fillStyle = obj.fill;
                        this.ctx.strokeStyle = obj.stroke;
                        this.ctx.lineWidth = obj.strokeWidth;
                        this.ctx.beginPath();
                        this.ctx.roundRect(obj.x, obj.y, obj.width, obj.height, 8);
                        this.ctx.fill();
                        if (obj.strokeWidth > 0) this.ctx.stroke();
                    } else if (obj.type === 'ellipse') {
                        this.ctx.fillStyle = obj.fill;
                        this.ctx.strokeStyle = obj.stroke;
                        this.ctx.lineWidth = obj.strokeWidth;
                        this.ctx.beginPath();
                        this.ctx.ellipse(obj.x + obj.width/2, obj.y + obj.height/2, obj.width/2, obj.height/2, 0, 0, Math.PI * 2);
                        this.ctx.fill();
                        if (obj.strokeWidth > 0) this.ctx.stroke();
                    } else if (obj.type === 'text') {
                        this.ctx.font = obj.font;
                        this.ctx.fillStyle = obj.fill;
                        this.ctx.fillText(obj.text, obj.x, obj.y);
                    }

                    // Draw selection
                    if (this.selectedObject === obj) {
                        this.ctx.strokeStyle = '#00d4ff';
                        this.ctx.lineWidth = 2;
                        this.ctx.setLineDash([5, 5]);
                        this.ctx.strokeRect(obj.x - 5, obj.y - 5, obj.width + 10, obj.height + 10);
                        
                        // Corner handles
                        const handleSize = 8;
                        this.ctx.setLineDash([]);
                        this.ctx.fillStyle = '#00d4ff';
                        [[-1,-1], [1,-1], [-1,1], [1,1]].forEach(([dx, dy]) => {
                            this.ctx.fillRect(
                                obj.x + dx * (obj.width/2) - handleSize/2,
                                obj.y + dy * (obj.height/2) - handleSize/2,
                                handleSize, handleSize
                            );
                        });
                    }

                    this.ctx.restore();
                });

                requestAnimationFrame(() => this.render());
            }

            onMouseDown(e) {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                this.startPoint = { x, y };
                
                if (this.selectedTool === 'select') {
                    // Check if clicking on an object
                    this.selectedObject = this.objects.slice().reverse().find(obj => {
                        return x >= obj.x && x <= obj.x + obj.width &&
                               y >= obj.y && y <= obj.y + obj.height;
                    });
                } else if (this.selectedTool === 'rect' || this.selectedTool === 'ellipse') {
                    this.isDragging = true;
                    const newObj = {
                        type: this.selectedTool,
                        x, y,
                        width: 0, height: 0,
                        fill: '#ff6b35',
                        stroke: '#ffffff',
                        strokeWidth: 2,
                        opacity: 1,
                        rotation: 0
                    };
                    this.objects.push(newObj);
                    this.selectedObject = newObj;
                }
            }

            onMouseMove(e) {
                if (!this.isDragging) return;
                
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                if (this.selectedObject) {
                    this.selectedObject.width = x - this.startPoint.x;
                    this.selectedObject.height = y - this.startPoint.y;
                }
            }

            onMouseUp(e) {
                this.isDragging = false;
            }
        }

        // Initialize
        const canvas = document.getElementById('main-canvas');
        const orretCanvas = new OrretCanvas(canvas);

        // Tool tab switching
        document.querySelectorAll('.tool-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tool-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const tool = tab.dataset.tool;
                const view = document.getElementById('canvas-view');
                
                if (tool === 'canvas' || tool === 'design') {
                    view.style.display = 'grid';
                } else if (tool === 'animate') {
                    view.style.display = 'grid';
                } else if (tool === 'browser') {
                    // Switch to browser view
                    view.innerHTML = `
                        <div class="browser-toolbar">
                            <button class="timeline-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="19" y1="12" x2="5" y2="12"/>
                                </svg>
                            </button>
                            <button class="timeline-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="15 18 9 12 15 6"/>
                                </svg>
                            </button>
                            <button class="timeline-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"/>
                                </svg>
                            </button>
                            <input type="text" class="browser-url" placeholder="Enter URL..." value="https://google.com">
                            <button class="timeline-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="17 1 21 5 17 9"/>
                                    <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                                    <polyline points="7 23 3 19 7 15"/>
                                    <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                                </svg>
                            </button>
                        </div>
                        <div class="browser-frame" style="grid-column: 2 / -1;">
                            <iframe src="https://google.com" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
                        </div>
                    `;
                    view.style.display = 'block';
                }
            });
        });

        // Color picker sync
        document.querySelectorAll('.color-picker').forEach(picker => {
            picker.addEventListener('input', (e) => {
                const textInput = e.target.parentElement.querySelector('.prop-input[type="text"]');
                if (textInput) textInput.value = e.target.value;
            });
        });
    </script>
</body>
</html>
